<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <title>Document</title>
  </head>
  <body>
    <div class="calc-wrap">
      <div class="calculator">
        <div class="display">
          <div class="expr" id="expr"></div>
          <div class="val" id="display">0</div>
        </div>
        <div class="btn-grid">
          <button class="btn-calc btn-op" id="buttonDivide" value="/">
            ÷
          </button>
          <button class="btn-calc btn-num" id="button7" value="7">7</button>
          <button class="btn-calc btn-num" id="button8" value="8">8</button>
          <button class="btn-calc btn-num" id="button8" value="8">9</button>
          <button class="btn-calc btn-op"  id="buttonSubtract" value="*">
            ×
          </button>
          <button class="btn-calc btn-num" id="button4" value="4">4</button>
          <button class="btn-calc btn-num" id="button5" value="5">5</button>
          <button class="btn-calc btn-num" id="button6" value="6">6</button>
          <button class="btn-calc btn-op" id="buttonSubtract" value="-">
            −
          </button>
          <button class="btn-calc btn-num" id="button8" value="1">1</button>
          <button class="btn-calc btn-num" id="button2" value="2">2</button>
          <button class="btn-calc btn-num" id="button3" value="3">3</button>
          <button class="btn-calc btn-op" id="buttonAdd" value="+">
            +
          </button>
          <button class="btn-calc btn-num" id="button0" value="0">0</button>
          <button class="btn-calc btn-num" id="buttonPoint" value=".">.</button>
          <button class="btn-calc btn-ac">AC</button>
        </div>
        <button class="btn-eq">=</button>
      </div>
    </div>
    <script src="script.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
